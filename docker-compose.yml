services:
  recipe-store:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Required by adapter-node for CSRF protection on form/upload POSTs.
      # Set to the origin you reach the app on (e.g. your Tailscale hostname).
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5}
    restart: unless-stopped
