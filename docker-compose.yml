services:
  recipe-store:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Required by adapter-node for CSRF protection on form/upload POSTs.
      # Set to the origin you reach the app on (e.g. your Tailscale hostname).
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      # Max request body size for uploads. adapter-node defaults to 512K, which
      # is far too small for a .melarecipes library (often tens/hundreds of MB).
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-1G}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5}
    restart: unless-stopped
    # Importing a large library decodes images and generates thumbnails. The
    # importer streams recipes one at a time to keep memory bounded, but give
    # the container enough headroom — at least ~512MB; 1GB is comfortable.
    mem_limit: ${MEM_LIMIT:-1g}
